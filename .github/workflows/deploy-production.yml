# Build imagen → GHCR → deploy SSH al VPS backend
# Secrets requeridos: VPS_HOST, VPS_USER, VPS_SSH_KEY
# Opcional si el paquete GHCR es privado en el VPS: VPS_GHCR_TOKEN (PAT read:packages)

name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      skip_migrate:
        description: Omitir migrate (solo reinicio de imagen)
        required: false
        default: "false"
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

concurrency:
  group: deploy-production-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build & Push GHCR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy VPS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      IMAGE_SHA: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_SHA: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          SKIP_MIGRATE: ${{ github.event_name == 'workflow_dispatch' && inputs.skip_migrate && '1' || '0' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: IMAGE_SHA,SKIP_MIGRATE
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/tukifac

            # Login GHCR en VPS si el paquete es privado
            if [ -n "${{ secrets.VPS_GHCR_TOKEN }}" ]; then
              echo "${{ secrets.VPS_GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            fi

            export TUKIFAC_IMAGE="${IMAGE_SHA}"
            export SKIP_MIGRATE="${SKIP_MIGRATE}"

            if [ -f deploy/scripts/deploy.sh ]; then
              bash deploy/scripts/deploy.sh
            else
              # Fallback sin scripts en VPS (solo compose + .env)
              PREV=$(grep '^TUKIFAC_IMAGE=' .env | cut -d= -f2- || true)
              [ -n "$PREV" ] && echo "$PREV" > .deploy/previous-image
              sed -i "s|^TUKIFAC_IMAGE=.*|TUKIFAC_IMAGE=${IMAGE_SHA}|" .env
              docker compose -f docker-compose.production.yml pull backend-go
              docker compose -f docker-compose.production.yml up -d --no-deps --force-recreate backend-go
              sleep 5
              if [ "${SKIP_MIGRATE}" != "1" ]; then
                docker compose -f docker-compose.production.yml exec -T backend-go ./tukifac-api migrate
              fi
              curl -sf http://127.0.0.1:3000/health
            fi

      - name: Deploy failed — rollback hint
        if: failure()
        run: |
          echo "::error::Deploy falló. En el VPS ejecute: cd /opt/tukifac && bash deploy/scripts/rollback.sh"
